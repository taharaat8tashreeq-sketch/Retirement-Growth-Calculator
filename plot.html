<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Retirement Savings Projector</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #f4f7f6; color: #333; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        .container { background: white; padding: 2rem; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); width: 100%; max-width: 900px; }
        .controls { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 30px; }
        .input-group { display: flex; flex-direction: column; }
        label { font-weight: bold; margin-bottom: 5px; font-size: 0.9rem; }
        input { padding: 8px; border: 1px solid #ccc; border-radius: 4px; font-size: 1rem; }
        .results { margin-top: 20px; padding: 15px; background: #eef9f5; border-left: 5px solid #2ecc71; border-radius: 4px; }
        canvas { max-height: 400px; }
    </style>
</head>
<body>

<div class="container">
    <h2>Retirement Growth Calculator</h2>

    <div class="controls">
        <div class="input-group">
            <label>Starting Amount (S) $</label>
            <input type="number" id="s" value="10000">
        </div>
        <div class="input-group">
            <label>Starting Age (SA)</label>
            <input type="number" id="sa" value="25">
        </div>
        <div class="input-group">
            <label>Interest Rate (R) %</label>
            <input type="number" id="r" value="7" step="0.1">
        </div>
        <div class="input-group">
            <label>Hourly Salary (HS) $</label>
            <input type="number" id="hs" value="30">
        </div>
        <div class="input-group">
            <label>Weekly Hours (T)</label>
            <input type="number" id="t" value="40">
        </div>
        <div class="input-group">
            <label>Annual Contribution (AC) %</label>
            <input type="number" id="ac" value="15">
        </div>
    </div>

    <div class="results">
        <strong>Estimated Balance at Age 65: </strong>
        <span id="finalBalance">$0.00</span>
    </div>

    <canvas id="retirementChart"></canvas>
</div>

<script>
    let myChart;

    function calculate() {
        // Get Input Values
        const S = parseFloat(document.getElementById('s').value);
        const SA = parseInt(document.getElementById('sa').value);
        const R_pct = parseFloat(document.getElementById('r').value) / 100;
        const HS = parseFloat(document.getElementById('hs').value);
        const T = parseFloat(document.getElementById('t').value);
        const AC_pct = parseFloat(document.getElementById('ac').value) / 100;

        // Calculate PMT (Annual Contribution)
        // Annual Salary = HS * T hours/week * 52 weeks
        const PMT = (HS * T * 52) * AC_pct;

        const yearsToRetire = 65 - SA;
        const labels = [];
        const data = [];

        // Initial setup for A_0
        // Formula: A_0 = S + PMT
        let currentBalance = S + PMT;

        labels.push(SA);
        data.push(currentBalance);

        for (let i = 1; i <= yearsToRetire; i++) {
            // Formula: A_i = (1 + R) * A_{i-1} + PMT
            currentBalance = (currentBalance * (1 + R_pct)) + PMT;
            labels.push(SA + i);
            data.push(currentBalance);
        }

        updateChart(labels, data);
        document.getElementById('finalBalance').innerText = new Intl.NumberFormat('en-US', { style: 'currency', currency: 'USD' }).format(currentBalance);
    }

    function updateChart(labels, data) {
        const ctx = document.getElementById('retirementChart').getContext('2d');

        if (myChart) {
            myChart.destroy();
        }

        myChart = new Chart(ctx, {
            type: 'line',
            data: {
                labels: labels,
                datasets: [{
                    label: 'Account Balance ($)',
                    data: data,
                    borderColor: '#2ecc71',
                    backgroundColor: 'rgba(46, 204, 113, 0.1)',
                    fill: true,
                    tension: 0.3
                }]
            },
            options: {
                responsive: true,
                scales: {
                    y: {
                        beginAtZero: true,
                        ticks: {
                            callback: function(value) {
                                return '$' + value.toLocaleString();
                            }
                        }
                    },
                    x: {
                        title: {
                            display: true,
                            text: 'Age'
                        }
                    }
                },
                plugins: {
                    tooltip: {
                        callbacks: {
                            label: function(context) {
                                return 'Balance: $' + context.parsed.y.toLocaleString();
                            }
                        }
                    }
                }
            }
        });
    }

    // Add event listeners to all inputs
    document.querySelectorAll('input').forEach(input => {
        input.addEventListener('input', calculate);
    });

    // Initial run
    calculate();
</script>

</body>
</html>
