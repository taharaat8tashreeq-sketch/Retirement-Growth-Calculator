<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Investment Growth Calculator</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { font-family: sans-serif; max-width: 800px; margin: 40px auto; padding: 20px; }
        .controls { display: grid; grid-template-columns: 1fr 2fr 1fr; gap: 20px; margin-bottom: 30px; background: #f4f4f4; padding: 20px; border-radius: 8px; }
        label { font-weight: bold; }
        canvas { background: #fff; }
    </style>
</head>
<body>

    <h2>Investment Growth ($A_i$)</h2>

    <div class="controls">
        <label>Initial Savings (S):</label>
        <input type="range" id="S" min="0" max="100000" step="1000" value="10000">
        <span id="S_val">$10,000</span>

        <label>Payment (PMT):</label>
        <input type="range" id="PMT" min="0" max="5000" step="100" value="500">
        <span id="PMT_val">$500</span>

        <label>Annual Interest (R):</label>
        <input type="range" id="R" min="0" max="0.07" step="0.0005" value="0.03">
        <span id="R_val">7%</span>

        <label>Total Years (i):</label>
        <input type="range" id="years" min="1" max="50" step="1" value="25">
        <span id="years_val">25</span>
    </div>

    <canvas id="growthChart"></canvas>

    <script>
        const ctx = document.getElementById('growthChart').getContext('2d');
        let chart;

        function calculateAi(S, PMT, R, maxI) {
            let data = [];
            let labels = [];
            for (let i = 0; i <= maxI; i++) {
                labels.push(i);
                // Closed form: Ai = S(1+R)^i + PMT * [((1+R)^(i+1) - 1) / R]
                let val;
                if (R === 0) {
                    val = S + (PMT * (i + 1));
                } else {
                    val = S * Math.pow(1 + R, i) + PMT * (Math.pow(1 + R, i + 1) - 1) / R;
                }
                data.push(val.toFixed(2));
            }
            return { labels, data };
        }

        function updateChart() {
            const S = parseFloat(document.getElementById('S').value);
            const PMT = parseFloat(document.getElementById('PMT').value);
            const R = parseFloat(document.getElementById('R').value);
            const years = parseInt(document.getElementById('years').value);

            // Update UI text
            document.getElementById('S_val').innerText = '$' + S.toLocaleString();
            document.getElementById('PMT_val').innerText = '$' + PMT.toLocaleString();
            document.getElementById('R_val').innerText = (R * 100).toFixed(1) + '%';
            document.getElementById('years_val').innerText = years;

            const { labels, data } = calculateAi(S, PMT, R, years);

            if (chart) {
                chart.data.labels = labels;
                chart.data.datasets[0].data = data;
                chart.update('none'); // Update without animation for smoothness
            } else {
                chart = new Chart(ctx, {
                    type: 'line',
                    data: {
                        labels: labels,
                        datasets: [{
                            label: 'Total Amount (Ai)',
                            data: data,
                            borderColor: '#2563eb',
                            backgroundColor: 'rgba(37, 99, 235, 0.1)',
                            fill: true,
                            tension: 0.3
                        }]
                    },
                    options: {
                        scales: {
                            y: { beginAtZero: true, ticks: { callback: v => '$' + v.toLocaleString() } }
                        }
                    }
                });
            }
        }

        // Listen for input changes
        document.querySelectorAll('input').forEach(input => {
            input.addEventListener('input', updateChart);
        });

        // Initial render
        updateChart();
    </script>
</body>
</html>
